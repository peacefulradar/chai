<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakshi — Build Something? 🛠️</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    font-family: 'Sora', Arial, sans-serif;
    overflow: hidden;
    background: #f5f0e8;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.5;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  .container {
    position: relative; z-index: 1;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 28px;
    gap: 10px;
  }

  .badge {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: #c0392b;
    background: #fdecea; border: 1.5px solid #f5c6c2;
    padding: 5px 14px; border-radius: 20px;
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700; color: #1a1612;
    line-height: 1.3; max-width: 480px;
    letter-spacing: -0.5px;
  }

  h1 span { color: #c0392b; font-style: italic; }

  p.sub {
    font-size: 14px; color: #9a948e;
    max-width: 340px; line-height: 1.7;
    margin-top: 4px;
  }

  .btn-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    justify-content: center; margin-top: 18px;
  }

  button {
    padding: 13px 28px;
    font-size: 15px; font-family: 'Sora', Arial, sans-serif;
    font-weight: 600; border: none; border-radius: 12px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }

  button:active { transform: scale(0.96) !important; }

  .yes-btn {
    background: #1a1612; color: #f5f0e8;
    box-shadow: 0 4px 18px rgba(26,22,18,0.2);
  }
  .yes-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,22,18,0.28); }

  .no-btn {
    background: #ede8dc; color: #9a948e;
    border: 1.5px solid #e3ddd0;
    position: absolute;
    transition: top 0.35s cubic-bezier(.4,0,.2,1), left 0.35s cubic-bezier(.4,0,.2,1), transform 0.2s;
  }

  #subOptions { display: none; flex-direction: column; gap: 10px; margin-top: 8px; }
  .opt-btn {
    background: white; color: #1a1612;
    border: 1.5px solid #e3ddd0;
    border-radius: 12px; padding: 12px 24px;
    font-size: 14px; font-family: 'Sora', Arial, sans-serif; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .opt-btn:hover { border-color: #c0392b; color: #c0392b; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(192,57,43,0.12); }

  #response {
    margin-top: 16px;
    font-size: 16px; line-height: 1.7;
    color: #1a1612; max-width: 380px;
    opacity: 0; transition: opacity 0.5s ease;
    font-weight: 500;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.1) rotate(15deg); opacity: 0; }
  }
  .floater {
    position: fixed; bottom: -40px;
    font-size: 22px; pointer-events: none;
    animation: floatUp linear infinite;
  }
</style>
</head>

<body>

<div class="container">
  <div class="badge">🛠️ A proposal</div>

  <h1>Sakshi, want to <span>build something</span> together?</h1>
  <p class="sub">Got an idea. Need a co-builder. Thought of you first.</p>

  <div class="btn-row" id="mainOptions">
    <button class="yes-btn" onclick="yesClicked()">Yes, tell me more 🚀</button>
    <button class="no-btn" id="noBtn">Nah, not interested</button>
  </div>

  <div id="subOptions">
    <button class="opt-btn" onclick="finalChoice('what')">What are we building? 👀</button>
    <button class="opt-btn" onclick="finalChoice('when')">When do we start? ⚡</button>
    <button class="opt-btn" onclick="finalChoice('how')">How does this work? 🤝</button>
  </div>

  <div id="response"></div>
</div>

<script>
  const noBtn = document.getElementById('noBtn');
  const response = document.getElementById('response');
  const mainOptions = document.getElementById('mainOptions');
  const subOptions = document.getElementById('subOptions');

  function placeNoBtn() {
    const pad = 24;
    const w = noBtn.offsetWidth || 140;
    const h = noBtn.offsetHeight || 48;
    const maxX = window.innerWidth - w - pad;
    const maxY = window.innerHeight - h - pad;
    noBtn.style.left = (pad + Math.random() * maxX) + 'px';
    noBtn.style.top  = (pad + Math.random() * maxY) + 'px';
  }
  placeNoBtn();
  noBtn.addEventListener('mouseover', placeNoBtn);
  noBtn.addEventListener('touchstart', e => { e.preventDefault(); placeNoBtn(); });

  function showMessage(msg) {
    response.style.opacity = 0;
    setTimeout(() => { response.innerHTML = msg; response.style.opacity = 1; }, 300);
  }

  function yesClicked() {
    showMessage("Love the energy! 🙌 So... what are you curious about?");
    mainOptions.style.display = 'none';
    subOptions.style.display = 'flex';
  }

  function finalChoice(c) {
    const msgs = {
      what: "A personal finance app for India — unified view of UPI, cards & subscriptions in plain language. You in? 👀",
      when: "Honestly? Yesterday. But realistically — this weekend, one call, zero pressure. 🗓️",
      how: "No pitch decks. No formalities. Just two people building something real. Split the work, share the wins. 🤝"
    };
    showMessage(msgs[c]);
  }

  const icons = ['💡', '🛠️', '🚀', '⚡', '📱', '✨', '🔧', '💻'];
  setInterval(() => {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (4 + Math.random() * 4) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 8000);
  }, 900);
</script>

</body>
</html>
