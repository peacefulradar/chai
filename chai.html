<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Let's Make a Plan 🗺️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Sora', Arial, sans-serif;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
  }
  .screen.active { display: flex; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #c0392b;
    background: #fdecea;
    border: 1.5px solid #f5c6c2;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 700;
    color: #1a1612;
    line-height: 1.3;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }

  h1 span {
    color: #c0392b;
    font-style: italic;
  }

  p.sub {
    font-size: 14px;
    color: #9a948e;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .options-grid {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .option-card {
    background: white;
    border: 1.5px solid #e3ddd0;
    border-radius: 16px;
    padding: 22px 28px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Sora', Arial, sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #1a1612;
    min-width: 160px;
  }

  .option-card:hover {
    border-color: #c0392b;
    color: #c0392b;
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(192,57,43,0.12);
  }

  .option-card .icon {
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
  }

  #screen2 h2 {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 700;
    color: #1a1612;
    margin-bottom: 6px;
  }

  #screen2 p {
    font-size: 13px;
    color: #9a948e;
    margin-bottom: 18px;
  }

  #map-container {
    width: 100%;
    max-width: 520px;
    background: white;
    border-radius: 20px;
    border: 1.5px solid #e3ddd0;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(26,22,18,0.08);
  }

  svg#india-map {
    width: 100%;
    height: auto;
  }

  svg#india-map path {
    fill: #ede8dc;
    stroke: #c8bfb0;
    stroke-width: 1;
    cursor: pointer;
    transition: fill 0.2s, transform 0.2s;
    transform-origin: center;
  }

  svg#india-map path:hover { fill: #f5c6c2; }
  svg#india-map path.selected { fill: #c0392b; }

  .tooltip {
    position: fixed;
    background: #1a1612;
    color: #f5f0e8;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    white-space: nowrap;
  }

  .back-btn {
    margin-top: 16px;
    background: none;
    border: 1.5px solid #e3ddd0;
    border-radius: 10px;
    padding: 8px 20px;
    font-family: 'Sora', Arial, sans-serif;
    font-size: 13px;
    color: #9a948e;
    cursor: pointer;
    transition: all 0.2s;
  }

  .back-btn:hover {
    border-color: #1a1612;
    color: #1a1612;
  }

  #screen3 { gap: 0; }

  .result-card {
    background: white;
    border-radius: 24px;
    border: 1.5px solid #e3ddd0;
    padding: 36px 32px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 12px 40px rgba(26,22,18,0.1);
    animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .result-emoji { font-size: 52px; margin-bottom: 14px; }
  .result-state {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #c0392b;
    margin-bottom: 8px;
  }

  .result-place {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    color: #1a1612;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .result-desc {
    font-size: 14px;
    color: #6b6560;
    line-height: 1.8;
    margin-bottom: 24px;
  }

  .result-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
  }

  .tag {
    background: #fdecea;
    color: #c0392b;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
  }

  .btn-row-result {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .primary-btn {
    background: #1a1612;
    color: #f5f0e8;
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    font-family: 'Sora', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .primary-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(26,22,18,0.25);
  }

  .secondary-btn {
    background: #ede8dc;
    color: #6b6560;
    border: 1.5px solid #e3ddd0;
    border-radius: 12px;
    padding: 12px 24px;
    font-family: 'Sora', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .secondary-btn:hover {
    border-color: #1a1612;
    color: #1a1612;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.8); opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.1); opacity: 0; }
  }

  .floater {
    position: fixed;
    bottom: -40px;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp linear infinite;
  }
</style>
</head>
<body>

<div class="tooltip" id="tooltip"></div>

<div class="screen active" id="screen1">
  <div class="badge">🗺️ Weekend Plan</div>
  <h1>Let's make a <span>plan</span> together</h1>
  <p class="sub">Pick what kind of trip you're feeling this weekend</p>

  <div class="options-grid">
    <div class="option-card" onclick="goToMap('nature')">
      <span class="icon">🏔️</span>Nature & Hills
    </div>
    <div class="option-card" onclick="goToMap('beach')">

    </div>
    <div class="option-card" onclick="goToMap('culture')">

    </div>
    <div class="option-card" onclick="goToMap('food')">
      <span class="icon">🍜</span>Food Trip
    </div>
  </div>
</div>

  <button class="back-btn" onclick="goBack(1)">← Change trip type</button>
</div>

<div class="screen" id="screen3">
  <div class="result-card">
    <div class="result-emoji" id="res-emoji">🏔️</div>
    <div class="result-state" id="res-state">State</div>

  function goToMap(vibe) {
    selectedVibe = vibe;

    const subtitles = {
      nature: 'Pick a state — find your nature escape 🌿',
      beach: 'Pick a coastal state — weekend beach trip awaits 🌊',
      culture: 'Pick a state — history is calling 🏛️',
      food: 'Pick a state — your stomach decides 🍛'
    };

    document.getElementById('map-subtitle').textContent = subtitles[vibe];
    showScreen(2);
  }

  function selectState(el) {
    document.querySelectorAll('#india-map path').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');

    const stateId = el.id;
    const stateName = el.getAttribute('data-name');
    const vibeData = destinations[selectedVibe];
    const dest = vibeData[stateId] || vibeData.default;

    document.getElementById('res-emoji').textContent = dest.emoji;
    document.getElementById('res-state').textContent = stateName + ' • Weekend Pick';
    document.getElementById('res-place').textContent = dest.place;
    document.getElementById('res-desc').textContent = dest.desc;

    const tagsEl = document.getElementById('res-tags');
    tagsEl.innerHTML = dest.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

    setTimeout(() => showScreen(3), 300);
  }

  function showScreen(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen' + n).classList.add('active');
    window.scrollTo(0, 0);
  }

  function goBack(n) {
    showScreen(n);
  }

  function shareIt() {
    const place = document.getElementById('res-place').textContent;
    const state = document.getElementById('res-state').textContent;
    const text = `Weekend plan: ${place} (${state}) 🗺️ Let's go!`;

    if (navigator.share) {
      navigator.share({ title: 'Weekend Plan', text });
    } else {
      navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard! Share it 🚀'));
    }
  }

  const tooltip = document.getElementById('tooltip');

  document.querySelectorAll('#india-map path').forEach(path => {
    path.addEventListener('mousemove', e => {
      tooltip.textContent = path.getAttribute('data-name');
      tooltip.style.opacity = 1;
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 28) + 'px';
    });

    path.addEventListener('mouseleave', () => {
      tooltip.style.opacity = 0;
    });
  });

  const icons = ['🗺️','✈️','🏔️','🌊','🍛','🏖️','🌿','⭐'];

  setInterval(() => {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (5 + Math.random() * 4) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 9000);
  }, 1200);
</script>
